@let orderByItems = this.orderByItems$ | async;
<button
  mat-button
  mat-stroked-button
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  [color]="activeLabel(orderByItems) ? 'primary' : undefined"
  [disabled]="!orderByItems || orderByItems.length === 0"
  (click)="isOpen = !isOpen">
  <p class="label-icon-container">
    <span class="label">Order by{{ activeLabel(orderByItems) ? ': ' + activeLabel(orderByItems) : '' }}</span>
    @if (activeDirection(orderByItems); as direction) {
    <span class="direction-icon">
      <mat-icon>{{ direction === 'desc' ? 'arrow_downward' : 'arrow_upward' }}</mat-icon>
    </span>
    }
    <span class="icon">
      <mat-icon>expand_more</mat-icon>
    </span>
  </p>
</button>
<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen"
  [cdkConnectedOverlayHasBackdrop]="true"
  [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
  (backdropClick)="isOpen = false">
  <mat-selection-list
    class="chip-popover-list mat-elevation-z4"
    [multiple]="false"
    [hideSingleSelectionIndicator]="true"
    (selectionChange)="onSelectionChange($event)">
    @for (item of orderByItems ?? []; track item.id) {
    <mat-list-option
      [value]="item"
      [selected]="item.orderBy"
      [disabled]="item.disabled"
      [matTooltip]="TOOLTIP_TEXT"
      [matTooltipDisabled]="!item.disabled">
      <span class="order-by-item">
        <span>{{ getLabel(item.labels) }}</span>
        @if (item.orderBy) {
        <span class="order-by-actions">
          <button
            mat-icon-button
            [matTooltip]="item.direction === 'desc' ? 'Sorted descending — click for ascending' : 'Sorted ascending — click for descending'"
            (click)="$event.stopPropagation(); toggleDirection(item)">
            <mat-icon>{{ item.direction === 'desc' ? 'arrow_downward' : 'arrow_upward' }}</mat-icon>
          </button>
          <button mat-icon-button (click)="$event.stopPropagation(); removeOrderBy()">
            <mat-icon>close</mat-icon>
          </button>
        </span>
        }
      </span>
    </mat-list-option>
    }
  </mat-selection-list>
</ng-template>
