@let orderByItems = this.orderByItems$ | async;
<button
  mat-button
  mat-stroked-button
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  color="primary"
  [disabled]="orderByItems.length === 0"
  (click)="isOpen = !isOpen">
  <p class="label-icon-container">
    <span class="label">Order by{{ activeLabel(orderByItems) ? ': ' + activeLabel(orderByItems) : '' }}</span>
    <span class="icon">
      <mat-icon>expand_more</mat-icon>
    </span>
  </p>
</button>
<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen"
  [cdkConnectedOverlayHasBackdrop]="true"
  [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
  (backdropClick)="isOpen = false">
  <mat-selection-list
    class="chip-popover-list mat-elevation-z4"
    [multiple]="false"
    [hideSingleSelectionIndicator]="true"
    (selectionChange)="onSelectionChange($event)">
    @for (item of orderByItems; track item.id) {
    <mat-list-option
      [value]="item"
      [selected]="item.orderBy"
      [disabled]="item.disabled"
      [matTooltip]="TOOLTIP_TEXT"
      [matTooltipDisabled]="!item.disabled">
      <span class="order-by-item">
        <span>{{ getLabel(item.labels) }}</span>
        @if (item.orderBy) {
        <button mat-icon-button (click)="$event.stopPropagation(); removeOrderBy()">
          <mat-icon>close</mat-icon>
        </button>
        }
      </span>
    </mat-list-option>
    }
  </mat-selection-list>
</ng-template>
