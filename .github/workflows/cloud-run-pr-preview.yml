name: PR Preview

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, closed]
    paths:
      - 'apps/dsp-app/src/**'
      - 'libs/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (leave blank to use the branch this workflow runs from)'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * *'  # daily at 02:00 UTC — clean up stale previews

jobs:
  deploy-preview:
    name: Build and deploy PR preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: cloud-run-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      SERVICE_NAME: dsp-app-pr-${{ github.event.pull_request.number }}
      IMAGE_TAG: pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Generate OpenAPI client
        run: npm run generate-openapi-module

      - name: Build Angular app (dev-server config → DEV API)
        run: npx nx run dsp-app:build:dev-server
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.GCP_ARTIFACT_REGISTRY }}/dsp-app:${{ env.IMAGE_TAG }}
          build-args: build_tag=pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_ARTIFACT_REGISTRY }}/dsp-app:${{ env.IMAGE_TAG }}
          flags: >-
            --port=4200
            --allow-unauthenticated
            --cpu=1
            --memory=256Mi
            --max-instances=1
            --cpu-throttling

      - name: Find existing preview comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- dsp-app-preview -->"

      - name: Post or update preview URL comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- dsp-app-preview -->
            ### DSP-APP Preview

            | | |
            |---|---|
            | **Preview URL** | ${{ steps.deploy.outputs.url }} |
            | **Cloud Run Service** | `${{ env.SERVICE_NAME }}` |
            | **Commit** | ${{ github.event.pull_request.head.sha }} |
            | **Backend** | DEV API (`api.dev.dasch.swiss`) |

            _Updated on every push. Deleted when PR closes or after 4 days._

  deploy-branch-preview:
    name: Build and deploy branch preview
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: cloud-run-preview-branch-${{ inputs.branch || github.ref_name }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Compute service name from branch
        run: |
          BRANCH="${{ inputs.branch || github.ref_name }}"
          # Lowercase, replace non-alphanumeric chars with hyphens, collapse runs, strip leading/trailing hyphens
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-34)
          echo "BRANCH_SLUG=${SLUG}" >> $GITHUB_ENV
          echo "SERVICE_NAME=dsp-app-branch-${SLUG}" >> $GITHUB_ENV
          echo "IMAGE_TAG=branch-${SLUG}" >> $GITHUB_ENV

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Generate OpenAPI client
        run: npm run generate-openapi-module

      - name: Build Angular app (dev-server config → DEV API)
        run: npx nx run dsp-app:build:dev-server
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.GCP_ARTIFACT_REGISTRY }}/dsp-app:${{ env.IMAGE_TAG }}
          build-args: build_tag=${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_ARTIFACT_REGISTRY }}/dsp-app:${{ env.IMAGE_TAG }}
          flags: >-
            --port=4200
            --allow-unauthenticated
            --cpu=1
            --memory=256Mi
            --max-instances=1
            --cpu-throttling

      - name: Output preview URL
        run: |
          echo "## Branch Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Preview URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cloud Run Service** | \`${{ env.SERVICE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ inputs.branch || github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend** | DEV API (\`api.dev.dasch.swiss\`) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Deleted automatically after 4 days by the daily stale-cleanup job._" >> $GITHUB_STEP_SUMMARY

  cleanup-preview:
    name: Clean up PR close
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: dsp-app-pr-${{ github.event.pull_request.number }}
      IMAGE_TAG: pr-${{ github.event.pull_request.number }}
    permissions:
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run service (if it exists)
        run: |
          gcloud run services delete "$SERVICE_NAME" \
            --region="${{ secrets.GCP_REGION }}" \
            --quiet 2>/dev/null || echo "Service $SERVICE_NAME not found, nothing to clean up."

      - name: Delete container image (if it exists)
        run: |
          gcloud artifacts docker images delete \
            "${{ secrets.GCP_ARTIFACT_REGISTRY }}/dsp-app:${{ env.IMAGE_TAG }}" \
            --delete-tags --quiet 2>/dev/null || echo "Image not found, nothing to clean up."

  cleanup-stale:
    name: Clean up stale (>4 days)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete stale PR preview services older than 4 days
        run: |
          CUTOFF=$(date -u -d '4 days ago' +%Y-%m-%dT%H:%M:%SZ)
          SERVICES=$(gcloud run services list \
            --region="${{ secrets.GCP_REGION }}" \
            --filter="metadata.name:dsp-app-pr-" \
            --format="json" 2>/dev/null || echo "[]")
          echo "$SERVICES" | \
          jq -r --arg cutoff "$CUTOFF" \
            '.[] | select(.metadata.creationTimestamp < $cutoff) | .metadata.name' | \
          while read -r SERVICE; do
            echo "Deleting stale PR service: $SERVICE"
            PR_NUM="${SERVICE#dsp-app-pr-}"
            gcloud run services delete "$SERVICE" \
              --region="${{ secrets.GCP_REGION }}" --quiet 2>/dev/null || true
            gcloud artifacts docker images delete \
              "${{ secrets.GCP_ARTIFACT_REGISTRY }}/dsp-app:pr-${PR_NUM}" \
              --delete-tags --quiet 2>/dev/null || true
          done

      - name: Delete stale branch preview services older than 4 days
        run: |
          CUTOFF=$(date -u -d '4 days ago' +%Y-%m-%dT%H:%M:%SZ)
          SERVICES=$(gcloud run services list \
            --region="${{ secrets.GCP_REGION }}" \
            --filter="metadata.name:dsp-app-branch-" \
            --format="json" 2>/dev/null || echo "[]")
          echo "$SERVICES" | \
          jq -r --arg cutoff "$CUTOFF" \
            '.[] | select(.metadata.creationTimestamp < $cutoff) | .metadata.name' | \
          while read -r SERVICE; do
            echo "Deleting stale branch service: $SERVICE"
            BRANCH_SLUG="${SERVICE#dsp-app-branch-}"
            gcloud run services delete "$SERVICE" \
              --region="${{ secrets.GCP_REGION }}" --quiet 2>/dev/null || true
            gcloud artifacts docker images delete \
              "${{ secrets.GCP_ARTIFACT_REGISTRY }}/dsp-app:branch-${BRANCH_SLUG}" \
              --delete-tags --quiet 2>/dev/null || true
          done
