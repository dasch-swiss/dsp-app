name: Release dsp-js

on:
  push:
    tags:
      - 'dsp-js-v*'

env:
  NodeVersion: 22.12.0

jobs:
  publish:
    name: Build and publish dsp-js to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NodeVersion }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NodeVersion }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build dsp-js
        run: npx nx build dsp-js

      - name: Publish to NPM
        run: npm publish dist/libs/dsp-js --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_DASCHBOT }}

  notification:
    name: Google chat notification about release
    needs: [ publish ]
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to google chat room "DSP releases"
        uses: lakto/google-chat-action@main
        with:
          url: ${{ secrets.GOOGLE_CHAT_DSP_RELEASES_WEBHOOK_URL }}
