name: CI

on: [ push ]

# Prevent wasting resources by canceling in-progress runs when a new run is triggered
# on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: DSP-APP Linting
    runs-on: ubuntu-latest
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Run linting
        run: npx nx run-many --all --target=lint --skip-nx-cache

  test:
    name: DSP-APP Unit tests
    runs-on: ubuntu-latest
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Run tests with coverage
        run: npm run unit-test-coverage-ci
        env:
          TZ: Europe/Zurich
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: unit-test-coverage
          fail_ci_if_error: false

  dsp-app-e2e-tests:
    name: DSP-APP E2E tests (${{ matrix.runner }})
    runs-on: ubuntu-latest
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    strategy:
      # Run all runners to completion even if one fails, so all failures are visible
      fail-fast: false
      matrix:
        include:
          # Heavy runner: specs with per-test DB resets (most resets, longest execution)
          - runner: heavy
            specs: cypress/e2e/system-admin/resource.cy.ts,cypress/e2e/system-admin/data-model-class.cy.ts
          # Rest runner: remaining specs (lighter, roughly equal total reset count)
          - runner: rest
            specs: cypress/e2e/system-admin/ontology.cy.ts,cypress/e2e/system-admin/projects.cy.ts,cypress/e2e/system-admin/file-representation.cy.ts,cypress/e2e/system-admin/lists.cy.ts,cypress/e2e/system-admin/project-members.cy.ts,cypress/e2e/system-admin/project-overview.cy.ts,cypress/e2e/system-admin/still-image.cy.ts,cypress/e2e/project-member/**/*.cy.ts,cypress/e2e/logged-out-user/**/*.cy.ts,cypress/e2e/performance/**/*.cy.ts
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # gets additionally all tags which we need
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Install Cypress dependencies
        run: |
          cd ./apps/dsp-app/cypress
          npm ci --prefer-offline --no-audit
      - name: Checkout DSP-API repo
        uses: actions/checkout@v6
        with:
          repository: dasch-swiss/dsp-api
          ref: main
          path: dsp-api
      - name: Start API
        run: |
          cd dsp-api
          make init-db-test
          docker compose -f docker-compose.yml up -d sipi ingest api
          ./webapi/scripts/wait-for-api.sh
      - name: Run e2e tests in CI
        run: npm run e2e-ci -- --spec "${{ matrix.specs }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-snapshots-${{ matrix.runner }}
          path: apps/dsp-app/cypress/fixtures/screenshots
      - name: Check Docker Container Logs
        run: |
          docker ps
          docker ps -q | xargs -I {} docker logs {}

  check-openapi-sync:
    name: Check OpenAPI Spec is Up-to-Date
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.DASCHBOT_PAT }}
      - name: Set up yq
        uses: mikefarah/yq@v4
      - id: check
        name: Run OpenAPI sync check
        run: |
          set +e
          ./scripts/check-openapi-sync.sh --verbose
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 2 ]; then
            echo "::warning::Failed to download spec after retries — DEV server may be unavailable."
            exit 0
          fi
          exit $exit_code
      - name: Set up Node.js
        if: always() && steps.check.outputs.exit_code == '1'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        if: always() && steps.check.outputs.exit_code == '1'
        run: npm ci --ignore-scripts
      - name: Update OpenAPI spec
        if: always() && steps.check.outputs.exit_code == '1'
        run: npm run update-openapi
      - name: Create PR if spec changed
        if: always() && steps.check.outputs.exit_code == '1'
        run: |
          if git diff --quiet; then
            echo "No spec changes after update — skipping PR creation."
            exit 0
          fi
          SPEC="libs/vre/3rd-party-services/open-api/dsp-api_spec.yaml"
          git fetch origin main
          LOCAL_VERSION=$(git show origin/main:"$SPEC" | yq '.info.version')
          REMOTE_VERSION=$(yq '.info.version' "$SPEC")
          if [ "$REMOTE_VERSION" = "$LOCAL_VERSION" ]; then
            echo "Spec changed but version is unchanged (${REMOTE_VERSION}) — skipping PR creation."
            exit 0
          fi
          PR_TITLE="chore(open-api): bump dsp-api spec ${LOCAL_VERSION} → ${REMOTE_VERSION}"
          EXISTING=$(gh pr list --state open --json title --jq "[.[] | select(.title == \"${PR_TITLE}\")] | length")
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open PR already exists for dsp-api version ${REMOTE_VERSION} — skipping PR creation."
            exit 0
          fi
          git config user.name "daschbot"
          git config user.email "daschbot@dasch.swiss"
          cp "$SPEC" /tmp/updated-spec.yaml
          BRANCH="chore/update-dsp-api-openapi-spec-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH" origin/main
          cp /tmp/updated-spec.yaml "$SPEC"
          git add "$SPEC"
          git commit -m "chore(open-api): bump dsp-api spec ${LOCAL_VERSION} → ${REMOTE_VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "${PR_TITLE}" \
            --body "Automated spec update detected by CI. Review diff and merge when the frontend is ready to adopt the new API." \
            --label "dependencies" \
            --label "dsp-api" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}

  docs-build-test:
    name: Docs Build Test
    runs-on: ubuntu-latest
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r docs/requirements.txt
      - name: Lint documentation
        run: make docs-lint
      - name: Build documentation
        run: make docs-build
