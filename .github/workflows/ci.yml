name: CI

on: [ push ]

# Prevent wasting resources by canceling in-progress runs when a new run is triggered
# on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: DSP-APP Linting
    runs-on: ubuntu-latest
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Run linting
        run: npx nx run-many --all --target=lint --skip-nx-cache

  test:
    name: DSP-APP Unit tests
    runs-on: ubuntu-latest
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Run tests with coverage
        run: npm run unit-test-coverage-ci
        env:
          TZ: Europe/Zurich
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: unit-test-coverage
          fail_ci_if_error: false

  dsp-app-e2e-tests:
    name: DSP-APP E2E tests
    runs-on: ubuntu-latest
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # gets additionally all tags which we need
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Install Cypress dependencies
        run: |
          cd ./apps/dsp-app/cypress
          npm ci --prefer-offline --no-audit
      - name: Checkout DSP-API repo
        uses: actions/checkout@v6
        with:
          repository: dasch-swiss/dsp-api
          ref: main
          path: dsp-api
      - name: Start API
        run: |
          cd dsp-api
          make init-db-test
          docker compose -f docker-compose.yml up -d sipi ingest api
          ./webapi/scripts/wait-for-api.sh
      - name: Run e2e tests in CI
        run: |
          npm run e2e-ci
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-snapshots
          path: apps/dsp-app/cypress/fixtures/screenshots
      - name: Check Docker Container Logs
        run: |
          docker ps
          docker ps -q | xargs -I {} docker logs {}

  check-openapi-sync:
    name: Check OpenAPI Spec is Up-to-Date
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up yq
        uses: mikefarah/yq@v4
      - id: check
        name: Run OpenAPI sync check
        run: |
          set +e
          ./scripts/check-openapi-sync.sh --verbose
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 2 ]; then
            echo "::warning::Failed to download spec after retries — DEV server may be unavailable."
            exit 0
          fi
          exit $exit_code
      - name: Set up Node.js
        if: steps.check.outputs.exit_code == '1' && github.ref == 'refs/heads/main'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        if: steps.check.outputs.exit_code == '1' && github.ref == 'refs/heads/main'
        run: npm ci --ignore-scripts
      - name: Update OpenAPI spec
        if: steps.check.outputs.exit_code == '1' && github.ref == 'refs/heads/main'
        run: npm run update-openapi
      - name: Create PR if spec changed
        if: steps.check.outputs.exit_code == '1' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet; then
            echo "No spec changes after update — skipping PR creation."
            exit 0
          fi
          DSP_API_VERSION=$(yq '.info.version' libs/vre/3rd-party-services/open-api/dsp-api_spec.yaml)
          git config user.name "daschbot"
          git config user.email "daschbot@dasch.swiss"
          BRANCH="chore/update-dsp-api-openapi-spec-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add libs/vre/3rd-party-services/open-api/dsp-api_spec.yaml
          git commit -m "chore: update dsp-api OpenAPI spec to ${DSP_API_VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update dsp-api OpenAPI spec to ${DSP_API_VERSION}" \
            --body "Automated spec update detected by CI. Review diff and merge when the frontend is ready to adopt the new API." \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  storybook-tests:
    name: Storybook Interaction Tests
    runs-on: ubuntu-latest
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Build Storybook
        run: npx nx run vre-ui-ui:build-storybook:ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Serve and run interaction tests
        run: |
          npx http-server dist/storybook/vre-ui-ui --port 6006 --silent &
          npx wait-on tcp:6006 --timeout 60000
          npx nx run vre-ui-ui:test-storybook -- --maxWorkers=2

  docs-build-test:
    name: Docs Build Test
    runs-on: ubuntu-latest
    if: |
      (github.event.head_commit == null ||
       !startsWith(github.event.head_commit.message, 'chore(main): release')) &&
      (github.event.head_commit == null ||
       github.event.head_commit.author.username != 'daschbot')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r docs/requirements.txt
      - name: Lint documentation
        run: make docs-lint
      - name: Build documentation
        run: make docs-build
