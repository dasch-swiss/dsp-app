name: CI

on: [ push ]

# Prevent wasting resources by canceling in-progress runs when a new run is triggered
# on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      automation_skip: ${{ steps.detect.outputs.automation_skip }}
      only_workflows: ${{ steps.detect.outputs.only_workflows }}
      only_pkg: ${{ steps.detect.outputs.only_pkg }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2   # shallow; depth-2 covers merge-base for branches off latest main
      - id: detect
        # Pass GitHub context via `env:` (NOT inline `${{ ... }}` in the script
        # body) — inline interpolation is a documented shell-injection vector:
        # a crafted commit message could break out of the string. Inside bash,
        # references are normal `$VAR` expansions and are safe.
        # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.username }}
          GH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          # Existing daschbot / release-please skip — consolidated.
          # COMMIT_MSG / COMMIT_AUTHOR are empty on PR events (not used by ci.yml
          # today, but defensively preserved). Empty strings don't match either
          # pattern, so automation_skip=false — same outcome as the prior
          # null-guard (head_commit == null || !startsWith(...)).
          if [[ "$COMMIT_MSG" == "chore(main): release"* || "$COMMIT_AUTHOR" == "daschbot" ]]; then
            echo "automation_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "automation_skip=false" >> "$GITHUB_OUTPUT"
          fi

          # Tag and direct-main pushes: full pipeline (no path-based skip).
          if [[ "$GH_REF" == refs/tags/* ]] || [ "$GH_REF" = "refs/heads/main" ]; then
            echo "only_workflows=false" >> "$GITHUB_OUTPUT"
            echo "only_pkg=false"       >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Feature branch push: fetch main and three-dot-diff.
          # No --depth on the fetch — the merge-base may be far back in main's
          # history; --depth=1 would silently break for any branch even slightly
          # behind main. Cost: a few seconds, runs once per CI invocation.
          if ! git fetch --no-tags origin main 2>/dev/null; then
            echo "::warning::could not fetch origin/main; running full pipeline"
            echo "only_workflows=false" >> "$GITHUB_OUTPUT"
            echo "only_pkg=false"       >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(git diff --name-only origin/main...HEAD 2>/dev/null || true)
          if [ -z "$DIFF" ]; then
            # No diff (rare for push events) — fail-safe.
            echo "only_workflows=false" >> "$GITHUB_OUTPUT"
            echo "only_pkg=false"       >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # only_workflows: every changed file is under .github/workflows/
          if echo "$DIFF" | grep -qv '^\.github/workflows/'; then
            only_workflows="false"
          else
            only_workflows="true"
          fi

          # Author-based override: only bot-authored workflow-only PRs
          # benefit from the skip. Human edits to workflow files often
          # change job logic that needs validating in the same PR — force
          # the full pipeline so the change is exercised.
          if [ "$only_workflows" = "true" ]; then
            case "$COMMIT_AUTHOR" in
              renovate*|dependabot*) ;;       # bot — keep skip
              *) only_workflows="false" ;;    # human — force full pipeline
            esac
          fi

          echo "only_workflows=$only_workflows" >> "$GITHUB_OUTPUT"

          # only_pkg: every changed file is package.json or package-lock.json
          if echo "$DIFF" | grep -qvE '^(package\.json|package-lock\.json)$'; then
            echo "only_pkg=false" >> "$GITHUB_OUTPUT"
          else
            echo "only_pkg=true"  >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: DSP-APP Linting
    needs: [changes]
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.automation_skip == 'false' &&
      needs.changes.outputs.only_workflows == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Run linting
        run: npx nx run-many --all --target=lint --skip-nx-cache

  test:
    name: DSP-APP Unit tests
    needs: [changes]
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.automation_skip == 'false' &&
      needs.changes.outputs.only_workflows == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Run tests with coverage
        run: npm run unit-test-coverage-ci
        env:
          TZ: Europe/Zurich
      - name: Upload coverage reports to Codecov
        if: needs.changes.result == 'success' && needs.changes.outputs.only_pkg == 'false'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: unit-test-coverage
          fail_ci_if_error: false

  dsp-app-e2e-tests:
    name: DSP-APP E2E tests (${{ matrix.runner }})
    needs: [changes]
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.automation_skip == 'false' &&
      needs.changes.outputs.only_workflows == 'false'
    runs-on: ubuntu-latest
    strategy:
      # Run all runners to completion even if one fails, so all failures are visible
      fail-fast: false
      matrix:
        include:
          # Heavy runner: resource.cy.ts (many API requests per test), data-model-class.cy.ts (DB reset per test), plus smaller specs to balance load
          - runner: heavy
            specs: cypress/e2e/system-admin/resource.cy.ts,cypress/e2e/system-admin/data-model-class.cy.ts,cypress/e2e/system-admin/still-image.cy.ts,cypress/e2e/system-admin/file-representation.cy.ts
          # Rest runner: remaining specs
          - runner: rest
            specs: cypress/e2e/system-admin/ontology.cy.ts,cypress/e2e/system-admin/projects.cy.ts,cypress/e2e/system-admin/lists.cy.ts,cypress/e2e/system-admin/project-members.cy.ts,cypress/e2e/system-admin/project-overview.cy.ts,cypress/e2e/project-member/**/*.cy.ts,cypress/e2e/logged-out-user/**/*.cy.ts,cypress/e2e/performance/**/*.cy.ts
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: cypress-${{ runner.os }}-
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Install Cypress binary
        run: npx cypress install
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Start app (background)
        run: npx nx run dsp-app:serve:production &
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Checkout DSP-API repo
        uses: actions/checkout@v6
        with:
          repository: dasch-swiss/dsp-api
          ref: main
          path: dsp-api
      - name: Start API
        run: |
          cd dsp-api
          make init-db-test
          docker compose -f docker-compose.yml up -d sipi ingest api
          ./webapi/scripts/wait-for-api.sh
      - name: Wait for app to be ready
        run: timeout 180 bash -c 'until curl -sf http://localhost:4200 > /dev/null 2>&1; do sleep 3; done'
      - name: Run e2e tests in CI
        working-directory: apps/dsp-app
        run: npx cypress run --browser chrome --spec "${{ matrix.specs }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-snapshots-${{ matrix.runner }}
          path: apps/dsp-app/cypress/fixtures/screenshots
      - name: Check Docker Container Logs
        if: failure()
        run: |
          docker ps
          docker ps -q | xargs -I {} docker logs {}

  dsp-app-e2e-tests-status:
    name: DSP-APP E2E tests
    needs: [changes, dsp-app-e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI integrity and aggregate matrix result
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::changes job failed (${{ needs.changes.result }}); refusing to report green"
            exit 1
          fi
          result="${{ needs.dsp-app-e2e-tests.result }}"
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "One or more e2e matrix runners failed (result: $result)"
            exit 1
          fi

  check-openapi-sync:
    name: Check OpenAPI Spec is Up-to-Date
    needs: [changes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.automation_skip == 'false' &&
      needs.changes.outputs.only_workflows == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up yq
        uses: mikefarah/yq@v4
      - id: check
        name: Run OpenAPI sync check
        run: |
          set +e
          ./scripts/check-openapi-sync.sh --verbose
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 2 ]; then
            echo "::warning::Failed to download spec after retries — DEV server may be unavailable."
            exit 0
          fi
          exit $exit_code
      - name: Set up Node.js
        if: always() && steps.check.outputs.exit_code == '1'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        if: always() && steps.check.outputs.exit_code == '1'
        run: npm ci --ignore-scripts
      - name: Update OpenAPI spec
        if: always() && steps.check.outputs.exit_code == '1'
        run: npm run update-openapi
      - name: Create PR if spec changed
        if: always() && steps.check.outputs.exit_code == '1'
        run: |
          if git diff --quiet; then
            echo "No spec changes after update — skipping PR creation."
            exit 0
          fi
          SPEC="libs/vre/3rd-party-services/open-api/dsp-api_spec.yaml"
          git fetch origin main
          LOCAL_VERSION=$(git show origin/main:"$SPEC" | yq '.info.version')
          REMOTE_VERSION=$(yq '.info.version' "$SPEC")
          if [ "$REMOTE_VERSION" = "$LOCAL_VERSION" ]; then
            echo "Spec changed but version is unchanged (${REMOTE_VERSION}) — skipping PR creation."
            exit 0
          fi
          PR_TITLE="chore(open-api): bump dsp-api spec ${LOCAL_VERSION} → ${REMOTE_VERSION}"
          EXISTING=$(gh pr list --state open --json title --jq "[.[] | select(.title == \"${PR_TITLE}\")] | length")
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open PR already exists for dsp-api version ${REMOTE_VERSION} — skipping PR creation."
            exit 0
          fi
          git config user.name "daschbot"
          git config user.email "daschbot@dasch.swiss"
          cp "$SPEC" /tmp/updated-spec.yaml
          BRANCH="chore/update-dsp-api-openapi-spec-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH" origin/main
          cp /tmp/updated-spec.yaml "$SPEC"
          git add "$SPEC"
          git commit -m "chore(open-api): bump dsp-api spec ${LOCAL_VERSION} → ${REMOTE_VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "${PR_TITLE}" \
            --body "Automated spec update detected by CI. Review diff and merge when the frontend is ready to adopt the new API." \
            --label "dependencies" \
            --label "dsp-api" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.DASCHBOT_PAT }}

  storybook-tests:
    name: Storybook Interaction Tests
    needs: [changes]
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.automation_skip == 'false' &&
      needs.changes.outputs.only_workflows == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - name: Generate OpenAPI client
        run: npm run generate-openapi-module
      - name: Build Storybook
        run: npx nx run dsp-app:build-storybook:ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Serve and run interaction tests
        run: |
          npx http-server dist/storybook --port 6006 --silent &
          npx wait-on tcp:6006 --timeout 60000
          npx nx run dsp-app:test-storybook:ci -- --maxWorkers=2

  docs-build-test:
    name: Docs Build Test
    needs: [changes]
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.automation_skip == 'false' &&
      needs.changes.outputs.only_workflows == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r docs/requirements.txt
      - name: Lint documentation
        run: make docs-lint
      - name: Build documentation
        run: make docs-build
